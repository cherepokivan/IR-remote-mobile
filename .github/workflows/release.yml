name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Get version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v1.0.0-dev")
          VERSION="${VERSION}-$(date +'%Y%m%d-%H%M%S')"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Build release APK
      run: gradle assembleRelease --no-daemon

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/IR-Remote-${{ steps.version.outputs.version }}.apk 2>/dev/null || \
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/IR-Remote-${{ steps.version.outputs.version }}.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        files: app/build/outputs/apk/release/IR-Remote-*.apk
        draft: false
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        body: |
          ## 📦 IR Remote - ${{ steps.version.outputs.version }}

          ### Изменения
          - Автоматическая сборка из коммита ${{ github.sha }}

          ### Установка
          1. Скачайте APK файл ниже
          2. Разрешите установку из неизвестных источников
          3. Установите приложение

          ### Требования
          - Android 5.0 (API 21) или выше
          - ИК-порт (опционально)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ steps.version.outputs.version }}
        path: app/build/outputs/apk/release/IR-Remote-*.apk
