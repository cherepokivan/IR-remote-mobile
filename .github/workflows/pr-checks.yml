name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2

    - name: Check code formatting
      run: gradle ktlintCheck --no-daemon || true

    - name: Run lint
      run: gradle lintDebug --no-daemon

    - name: Run unit tests
      run: gradle testDebugUnitTest --no-daemon

    - name: Build debug APK
      run: gradle assembleDebug --no-daemon

    - name: Comment PR with build status
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const fs = require('fs');
          const status = '${{ job.status }}';
          const message = status === 'success'
            ? '✅ All checks passed! Build successful.'
            : '❌ Some checks failed. Please review the logs.';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });

  size-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Build APK
      run: gradle assembleDebug --no-daemon

    - name: Check APK size
      run: |
        APK_SIZE=$(stat -c%s app/build/outputs/apk/debug/app-debug.apk 2>/dev/null || stat -f%z app/build/outputs/apk/debug/app-debug.apk)
        APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
        echo "APK Size: ${APK_SIZE_MB}MB"
        echo "APK_SIZE_MB=${APK_SIZE_MB}" >> $GITHUB_ENV

    - name: Comment APK size
      uses: actions/github-script@v7
      with:
        script: |
          const size = process.env.APK_SIZE_MB;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `📦 APK Size: **${size}MB**`
          });
